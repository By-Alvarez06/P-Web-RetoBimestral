<div class="dash-layout">
  @if (isSidebarOpen()) {
    <div class="dash-overlay" (click)="closeSidebar()" aria-hidden="true"></div>
  }

  <aside class="dash-sidebar" [class.open]="isSidebarOpen()" aria-label="Menú administrativo">
    <div class="dash-brand">
      <span class="logo-mark">IS</span>
      <div>
        <strong>ISBEN Solutions</strong>
        <span>Comercializadora</span>
      </div>
    </div>

    <span class="dash-nav-section">Administración</span>

    <nav class="dash-nav" aria-label="Navegación de la comercializadora">
      @for (item of navItems; track item.route) {
        <a class="dash-nav-item" [routerLink]="item.route" routerLinkActive="active"
           (click)="closeSidebar()" [attr.aria-label]="item.label">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
          </svg>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="dash-sidebar-user">
      <div class="user-avatar">{{ initials() }}</div>
      <div style="min-width:0; overflow:hidden;">
        <strong>{{ auth.user()?.nombre }}</strong>
        <span>Administrador</span>
      </div>
      <a class="logout-btn" (click)="logout()" role="button" tabindex="0" aria-label="Cerrar sesión">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </a>
    </div>
  </aside>

  <div class="dash-main">
    <header class="dash-topbar">
      <div class="dash-topbar__left">
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Abrir menú">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <span class="topbar-title">Panel Administrativo</span>
      </div>
    </header>

    <div class="dash-content">
      <router-outlet />
    </div>
  </div>
</div>
