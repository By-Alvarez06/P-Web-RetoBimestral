{% extends "comercio/master_comercio.html" %}

{% block contenido_comercio %}
<div class="contenedor">
    <h1>Nueva Campaña de Recompensa</h1>
    <div class="detalle">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="acciones">
                <button type="submit" class="btn btn-primary">Guardar Campaña</button>
                <a href="{% url 'listar_campanas' %}">Cancelar</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
