{% extends "comercio/master_comercio.html" %}

{% block contenido_comercio %}
<div class="contenedor">
    <h1>Editar Producto</h1>
    <div class="detalle">
    <h2 style="color: var(--orange-dark); margin-top: 0;">Producto: {{ producto.nombre }}</h2>
    <form method="post">
        {% csrf_token %}
        
        <h3 style="border-bottom: 1px solid var(--border); padding-bottom: 8px;">Datos del Producto</h3>
        {{ form_producto.as_p }}
        
        <h3 style="border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 24px;">Gestión de Inventario</h3>
        {{ form_inventario.as_p }}
        
        <div class="acciones">
            <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
            <a href="{% url 'ver_producto' producto.id %}">Cancelar</a>
        </div>
    </form>
</div>
</div>

{% endblock %}
