{% extends "comercio/master_comercio.html" %}

{% block contenido_comercio %}
<div class="formulario-edit">
    <h2 style="color: var(--orange-dark); margin-top: 0;">Abastecer Inventario</h2>
    <p style="color: var(--text-muted); margin-bottom: 24px;">Actualizando existencias para el producto: <strong>{{ inventario.producto.nombre }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-field">
            {{ form.as_p }}
        </div>
        
        <div style="margin-top: 32px; display: flex; gap: 16px; align-items: center;">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{% url 'ver_inventario' inventario.id %}" style="font-weight: 700; color: var(--text-muted);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
