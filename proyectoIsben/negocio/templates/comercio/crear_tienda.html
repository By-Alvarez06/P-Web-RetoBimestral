{% extends "comercio/master_comercio.html" %}
{% load static %}

{% block contenido_comercio %}
<div class="contenedor">
    <div class="detalle">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            {% include "_mapa_seleccion_tienda.html" %}
            <div class="acciones">
                <button type="submit" class="btn btn-primary">Crear</button>
                <a href="{% url 'listar_tiendas' %}">Cancelar</a>
            </div>
        </form>
    </div>
</div>


{% endblock %}
