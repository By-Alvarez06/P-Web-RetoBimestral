{% extends "vendedor/master_vendedor.html" %}

{% block contenido_vendedor %}
<div class="formulario-edit">
    <p>¿Seguro que deseas eliminar la tienda {{ tienda.nombre }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Eliminar</button>
        <a href="{% url 'ver_tienda' tienda.id %}">Cancelar</a>
    </form>
</div>
{% endblock %}
