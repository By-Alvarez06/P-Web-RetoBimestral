{% extends "vendedor/master_vendedor.html" %}

{% block contenido_vendedor %}
<div class="toolbar">
    <a href="{% url 'crear_tienda' %}" class="btn btn-primary">Nueva Tienda</a>
</div>
<div class="table">
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Propietario</th>
                <th>Direccion</th>
                <th>Telefono</th>
            </tr>
        </thead>
        {% for t in tiendas %}
        <tbody>
            <tr class="fila" data-href="{% url 'ver_tienda' t.id %}">
                <td>{{ t.nombre }}</td>
                <td>{{ t.propietario }}</td>
                <td>{{ t.direccion }}</td>
                <td>{{ t.telefono }}</td>
            </tr>
        </tbody>
        {% endfor %}
    </table>
</div>
<script>
    document.querySelectorAll(".fila").forEach(function (fila) {
        fila.addEventListener("click", function () {
            window.location = fila.dataset.href;
        });
    });
</script>
{% endblock %}
