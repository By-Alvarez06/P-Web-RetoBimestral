{% extends "vendedor/master_vendedor.html" %}

{% block contenido_vendedor %}

<div class="table">
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>Tienda</th>
                <th>Fecha</th>
                <th>Monto Tienda</th>
                <th>Detalles</th>
            </tr>
        </thead>
        {% for p in pedidos %}
        <tbody>
            <tr>
                <td>{{ p.estado }}</td>
                <td>{{ p.obtener_tienda }}</td>
                <td>{{ p.fecha }}</td>
                <td>{{ p.monto_total_tienda }}</td>
                <td>
                    [<a href="{% url 'editar_pedido' p.id %}">Editar</a>]
                </td>
            </tr>
        </tbody>
        {% endfor %}
    </table>
</div>
{% endblock %}
