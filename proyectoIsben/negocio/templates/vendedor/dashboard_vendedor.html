{% extends "vendedor/master_vendedor.html" %}

{% block contenido_vendedor %}

<div class="table">
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>Tienda</th>
                <th>Fecha</th>
                <th>Monto Tienda</th>
            </tr>
        </thead>
        <tbody>
        {% for p in pedidos %}
            <tr class="fila" data-href="{% url 'ver_pedido' p.id %}">
                <td>{{ p.estado }}</td>
                <td>{{ p.obtener_tienda }}</td>
                <td>{{ p.fecha }}</td>
                <td>{{ p.monto_total_tienda }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
<script>
    document.querySelectorAll(".fila").forEach(function (fila) {
        fila.addEventListener("click", function () {
            window.location = fila.dataset.href;
        });
    });
</script>
{% endblock %}
